name: betmonster

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"

  wallet:
    build:
      context: .
      dockerfile: Dockerfile.wallet
    image: betmonster/wallet
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      PORT: "8081"
      DATABASE_URL: postgres://wallet:wallet@postgres:5432/wallet?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      # xcash exposes Caddy on the xcash_public network; Django expects the Host header xcash-caddy.
      XCASH_BASE_URL: http://xcash-caddy:80
      XCASH_APPID: ${XCASH_APPID:-}
      XCASH_HMAC_KEY: ${XCASH_HMAC_KEY:-}
      XCASH_WEBHOOK_SECRET: ${XCASH_WEBHOOK_SECRET:-}
      SUPPORTED_PAIRS: ${SUPPORTED_PAIRS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - default
      - xcash_public

  oddsfeed:
    build:
      context: .
      dockerfile: Dockerfile.oddsfeed
    image: betmonster/oddsfeed
    ports:
      - "8082:8082"
      - "50052:50052"
    environment:
      PORT: "8082"
      GRPC_PORT: "50052"
      DATABASE_URL: postgres://wallet:wallet@postgres:5432/oddsfeed?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      PROVIDERS: ${ODDSFEED_PROVIDERS:-azuro}
      AZURO_GRAPH_URL: ${ODDSFEED_AZURO_GRAPH_URL:-}
      AZURO_WS_URL: ${ODDSFEED_AZURO_WS_URL:-}
      AZURO_ENVIRONMENT: ${ODDSFEED_AZURO_ENVIRONMENT:-PolygonUSDT}
      SYNC_INTERVAL_SECONDS: ${ODDSFEED_SYNC_INTERVAL_SECONDS:-60}
      WS_RECONNECT_MAX_SECONDS: ${ODDSFEED_WS_RECONNECT_MAX_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: betmonster/gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      JWKS_URL: ${JWKS_URL:-http://app:3000/api/auth/jwks}
      WALLET_SERVICE_ADDR: wallet:50051
      ODDSFEED_SERVICE_ADDR: oddsfeed:50052
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SUPPORTED_CURRENCIES: ${SUPPORTED_CURRENCIES:-}
      SUPPORTED_CHAINS: ${SUPPORTED_CHAINS:-}
      SUPPORTED_PAIRS: ${SUPPORTED_PAIRS:-}
      REDIS_ADDR: redis:6379
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-100}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-100}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-memory}
      MIN_DEPOSIT: ${MIN_DEPOSIT:-}
      MAX_DEPOSIT: ${MAX_DEPOSIT:-}
      DAILY_DEPOSIT: ${DAILY_DEPOSIT:-}
      MIN_WITHDRAWAL: ${MIN_WITHDRAWAL:-}
      MAX_WITHDRAWAL: ${MAX_WITHDRAWAL:-}
      DAILY_WITHDRAWAL: ${DAILY_WITHDRAWAL:-}
    depends_on:
      app:
        condition: service_started
      wallet:
        condition: service_started
      redis:
        condition: service_started
      oddsfeed:
        condition: service_started

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
        NEXT_PUBLIC_GO_API_URL: ${NEXT_PUBLIC_GO_API_URL:-http://localhost:8080}
        GO_API_URL: ${GO_API_URL:-http://gateway:8080}
    image: betmonster/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GO_API_URL: ${NEXT_PUBLIC_GO_API_URL:-http://localhost:8080}
      GO_API_URL: http://gateway:8080
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      DATABASE_URL: postgres://wallet:wallet@postgres:5432/better_auth?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

networks:
  xcash_public:
    external: true

volumes:
  postgres_data:
